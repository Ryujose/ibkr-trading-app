name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libvulkan-dev vulkan-validationlayers \
            libglfw3-dev \
            libprotobuf-dev protobuf-compiler \
            libgl1-mesa-dev

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twsapi_macunix.1037.02.tar.gz.enc \
            -out twsapi_macunix.1037.02.tar.gz \
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          rm twsapi_macunix.1037.02.tar.gz

      - name: Cache build dependencies (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: linux-deps-

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DIBKR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-trading-app-linux
          path: build/ibkr-trading-app
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake glfw protobuf@21 vulkan-headers vulkan-loader molten-vk

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twsapi_macunix.1037.02.tar.gz.enc \
            -out twsapi_macunix.1037.02.tar.gz \
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          rm twsapi_macunix.1037.02.tar.gz

      - name: Cache build dependencies (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: macos-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: macos-deps-

      - name: Configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix protobuf@21);$(brew --prefix)" \
            -DIBKR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-trading-app-macos
          path: build/ibkr-trading-app
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache vcpkg installed packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-static-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: vcpkg-x64-windows-static-

      - name: Install dependencies via vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: vcpkg install glfw3:x64-windows-static protobuf:x64-windows-static

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 `
            -in twsapi_macunix.1037.02.tar.gz.enc `
            -out twsapi_macunix.1037.02.tar.gz `
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          Remove-Item twsapi_macunix.1037.02.tar.gz
        shell: pwsh

      - name: Regenerate protobuf sources
        run: |
          $protoc = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\tools\protobuf\protoc.exe"
          $PROTO_SRC = (Resolve-Path "twsapi_macunix.1037.02/IBJts/source/proto").Path
          $PROTO_OUT = (Resolve-Path "twsapi_macunix.1037.02/IBJts/source/cppclient/client/protobufUnix").Path
          Get-ChildItem $PROTO_SRC -Filter *.proto | ForEach-Object {
            & $protoc --cpp_out=$PROTO_OUT --proto_path=$PROTO_SRC $_.FullName
          }
        shell: pwsh

      - name: Cache build dependencies (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: windows-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: windows-deps-

      - name: Configure
        run: >
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
          -DIBKR_BUILD_TESTS=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure
        shell: pwsh

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-trading-app-windows
          path: build/Release/ibkr-trading-app.exe
          retention-days: 30

  # ── Sanitizer job (Linux only) ────────────────────────────────────────────
  # Builds tests-core with AddressSanitizer + UBSanitizer.
  # tests-ibkr is excluded here to avoid false positives from third-party IB
  # API code that we do not control.
  sanitize-linux:
    runs-on: ubuntu-latest
    needs: build-linux  # only run if the main Linux build passes

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libvulkan-dev vulkan-validationlayers \
            libglfw3-dev \
            libprotobuf-dev protobuf-compiler \
            libgl1-mesa-dev

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twsapi_macunix.1037.02.tar.gz.enc \
            -out twsapi_macunix.1037.02.tar.gz \
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          rm twsapi_macunix.1037.02.tar.gz

      - name: Cache build dependencies (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: linux-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: linux-deps-

      - name: Configure (Debug + ASan + UBSan on tests-core)
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIBKR_BUILD_TESTS=ON \
            -DIBKR_SANITIZE=ON

      - name: Build tests-core only
        run: cmake --build build -j$(nproc) --target tests-core

      - name: Run tests-core with sanitizers
        run: |
          ASAN_OPTIONS=detect_leaks=0 \
          UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
          ./build/tests/tests-core
