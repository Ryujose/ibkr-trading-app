name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libvulkan-dev vulkan-validationlayers \
            libglfw3-dev \
            libprotobuf-dev protobuf-compiler \
            libgl1-mesa-dev

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twsapi_macunix.1037.02.tar.gz.enc \
            -out twsapi_macunix.1037.02.tar.gz \
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          rm twsapi_macunix.1037.02.tar.gz

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-trading-app-linux
          path: build/ibkr-trading-app
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake glfw protobuf@21 vulkan-headers vulkan-loader molten-vk

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 \
            -in twsapi_macunix.1037.02.tar.gz.enc \
            -out twsapi_macunix.1037.02.tar.gz \
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          rm twsapi_macunix.1037.02.tar.gz

      - name: Configure
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix protobuf@21);$(brew --prefix)"

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-trading-app-macos
          path: build/ibkr-trading-app
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-x64-windows-static-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: vcpkg-x64-windows-static-

      - name: Install dependencies via vcpkg
        run: vcpkg install glfw3:x64-windows-static protobuf:x64-windows-static

      - name: Decrypt TWS API
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 `
            -in twsapi_macunix.1037.02.tar.gz.enc `
            -out twsapi_macunix.1037.02.tar.gz `
            -pass pass:${{ secrets.TWSAPI_DECRYPT_KEY }}
          tar -xzf twsapi_macunix.1037.02.tar.gz
          Remove-Item twsapi_macunix.1037.02.tar.gz
        shell: pwsh

      - name: Regenerate protobuf sources
        run: |
          $protoc = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\tools\protobuf\protoc.exe"
          $PROTO_SRC = (Resolve-Path "twsapi_macunix.1037.02/IBJts/source/proto").Path
          $PROTO_OUT = (Resolve-Path "twsapi_macunix.1037.02/IBJts/source/cppclient/client/protobufUnix").Path
          Get-ChildItem $PROTO_SRC -Filter *.proto | ForEach-Object {
            & $protoc --cpp_out=$PROTO_OUT --proto_path=$PROTO_SRC $_.FullName
          }
        shell: pwsh

      - name: Configure
        run: >
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ibkr-trading-app-windows
          path: build/Release/ibkr-trading-app.exe
          retention-days: 30
